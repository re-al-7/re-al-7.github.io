baseURL = "https://re-al-7.github.io/"
languageCode = "es"
title = "Re-Al Dev World"
googleAnalytics = "UA-101899002-1"

[module]
  [[module.imports]]
    path = "github.com/jpanther/congo/v2"

[params]
  colorScheme = "dracula"
  defaultAppearance = "dark"
  autoSwitchAppearance = true
  description = "Un blog de R. Alonzo Vera A."
  mainSections = ["posts"]
  enableSearch = true

  [params.homepage]
    layout = "profile"
    showRecent = true
    recentLimit = 10

  [params.author]
    name = "Alonzo Vera A."
    email = "7.re.al.7@gmail.com"
    headline = "Developer | .Net | PostgreSQL | DevOps"
    image = "profile.jpg"
    links = [
      { twitter = "https://twitter.com/re_al_" },
      { github = "https://github.com/re-al-7" },
      { linkedin = "https://linkedin.com/in/real7" },
    ]

  [params.article]
    showComments = true
    showReadingTime = true
    showTableOfContents = true
    showPagination = true
    sharingLinks = ["twitter", "linkedin", "facebook", "email"]

[taxonomies]
  tag = "tags"
  category = "categories"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[pagination]
  pagerSize = 10

[[menus.main]]
  name = "Posts"
  pageRef = "/posts"
  weight = 10

[[menus.main]]
  name = "Tags"
  pageRef = "/tags"
  weight = 20

[[menus.main]]
  name = "Sobre mí"
  pageRef = "/about"
  weight = 30
